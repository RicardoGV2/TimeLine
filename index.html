<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeLine</title>
    <link rel="stylesheet" href="src/styles.css" />
    <link rel="stylesheet" href="src/mobile-sidebar.css" />
    <link rel="stylesheet" href="src/mobile-sidebar-v2.css" />
    <link rel="stylesheet" href="src/current-date-highlight.css" />
    <link rel="stylesheet" href="src/related-focus.css" />
    <link rel="stylesheet" href="src/domain-multiselect.css" />
    <link rel="stylesheet" href="src/domain-only-filter.css" />
    <link rel="stylesheet" href="src/sidebar-final-polish.css" />
    <link rel="stylesheet" href="src/goals-only-toggle.css" />
    <link rel="stylesheet" href="src/detail-item-navigation.css" />
    <link rel="stylesheet" href="src/month-layout-fix.css" />
    <link rel="stylesheet" href="src/card-open-final.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="brand">
          <div class="brand-mark">↗</div>
          <div>
            <h1>TimeLine</h1>
            <p>Living roadmap for goals, ideas, tasks and knowledge</p>
          </div>
        </div>

        <nav class="top-nav" aria-label="Main navigation">
          <button class="nav-button active" data-view="timeline">☷ Timeline</button>
          <button class="nav-button" data-view="bases">▧ Bases</button>
          <button class="nav-button" data-view="dashboard">▦ Dashboard</button>
          <button class="nav-button" data-view="knowledge">☰ Knowledge</button>
          <button class="nav-button" data-view="ideas">✦ Ideas</button>
        </nav>
      </header>

      <section class="filters" aria-label="Filters">
        <label>
          User
          <select id="filter-user">
            <option value="all">All</option>
          </select>
        </label>
        <label>
          Domain
          <select id="filter-domain">
            <option value="all">All</option>
          </select>
        </label>
        <label>
          Base
          <select id="filter-base">
            <option value="all">All</option>
          </select>
        </label>
        <label>
          Status
          <select id="filter-status">
            <option value="all">All</option>
          </select>
        </label>
        <label>
          Priority
          <select id="filter-priority">
            <option value="all">All</option>
          </select>
        </label>
        <label>
          Search
          <input id="filter-search" type="search" placeholder="Search goals, milestones, notes..." />
        </label>
      </section>

      <main class="layout">
        <aside class="sidebar" aria-label="Domains">
          <div class="sidebar-title">Domains</div>
          <div id="domain-list" class="domain-list"></div>
          <button class="new-goal-button" type="button">+ New Goal</button>
        </aside>

        <section class="content">
          <div id="view-root"></div>
        </section>
      </main>
    </div>

    <aside id="detail-panel" class="detail-panel" aria-label="Detail panel" aria-hidden="true">
      <button id="close-detail" class="close-detail" type="button" aria-label="Close">×</button>
      <div id="detail-content"></div>
    </aside>

    <div id="panel-backdrop" class="panel-backdrop" hidden></div>

    <script type="module" src="src/app-v3.js"></script>
    <script type="module" src="src/mobile-sidebar-v2.js"></script>
    <script type="module" src="src/current-date-highlight.js"></script>
    <script type="module" src="src/related-focus.js"></script>
    <script type="module" src="src/domain-only-filter.js"></script>
    <script type="module" src="src/goals-only-toggle.js"></script>
    <script type="module" src="src/month-detail-open-fix.js"></script>
    <script type="module" src="src/card-open-final.js"></script>
  </body>
</html>
